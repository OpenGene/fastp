name: fastp ci
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libhwy-dev libdeflate-dev libisal-dev

      - name: install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install highway libdeflate isa-l

      - name: build fastp
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: smoke test
        run: |
          ./fastp --version
          ./fastp -i testdata/R1.fq -o /dev/null
