name: fastp ci
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libhwy-dev libdeflate-dev libisal-dev

      - name: install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libdeflate isa-l

      - name: build Highway static (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth=1 --branch 1.3.0 https://github.com/google/highway.git /tmp/highway
          cd /tmp/highway
          cmake -B _build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DHWY_ENABLE_TESTS=OFF -DHWY_ENABLE_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX=/tmp/hwy-install
          cmake --build _build -j$(sysctl -n hw.ncpu)
          cmake --install _build

      - name: build fastp
        run: |
          if [ -d /tmp/hwy-install ]; then
            EXTRA_INC="/tmp/hwy-install/include"
            EXTRA_LIB="/tmp/hwy-install/lib"
          fi
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) \
            INCLUDE_DIRS="${EXTRA_INC:-}" LIBRARY_DIRS="${EXTRA_LIB:-}"

      - name: smoke test
        run: |
          ./fastp --version
          ./fastp -i testdata/R1.fq -o /dev/null
